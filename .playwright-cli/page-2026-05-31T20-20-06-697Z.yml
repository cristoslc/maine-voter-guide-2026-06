              - paragraph [ref=e101]: In 2025, we're going to increase voter turnout by working with marginalized communities, especially young people, immigrants and low-income workers. We will register students and new citizens to vote, canvass through our Neighbor-to-Neighbor program, and develop curricula to educate young people about government and civic engagement.
