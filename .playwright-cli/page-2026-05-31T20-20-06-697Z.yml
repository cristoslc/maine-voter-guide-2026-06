              - text: The League of Women Voters of Maine is a
              - strong [ref=e56]: nonpartisan, grassroots
              - text: political organization that encourages informed and active participation in government, works to increase understanding of major public policy issues, and influences public policy through
              - strong [ref=e57]: education
