              - paragraph [ref=e109]: The Downeast Chapter of the League of Women Voters, in cooperation with WERU FM, produces a monthly radio program on topics in participatory democracy called the Democracy Forum. Broadcasts may be heard from 4:00 PM – 5:00 PM on the third Friday of the month at WERU Community Radio, 89.9 FM.
