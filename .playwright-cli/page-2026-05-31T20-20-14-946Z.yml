                      - text: ". You can vote in Maine if you are:"
                    - list [ref=e64]:
                      - listitem [ref=e65]: A citizen of the United States
                      - listitem [ref=e66]: An established resident in the town where you intend to register and vote
                      - listitem [ref=e67]: At least 18 years of age
                    - paragraph [ref=e68]: You cannot be turned away from your voting place if you meet the requirements listed above.
                    - paragraph [ref=e69]: "Your voting rights:"
                    - list [ref=e70]:
                      - listitem [ref=e71]: Registered voters are not required to show ID in order to vote.
                      - listitem [ref=e72]: You must be allowed to vote a challenged ballot even if you don't have ID or proof of where you live.
                      - listitem [ref=e73]: As of January 1, 2020, you may pre-register when you are 16, but you must be 18 years old to vote.
                      - listitem [ref=e74]: Registered voters who are 17 years old may vote in primary elections if they will be 18 by the general election.
