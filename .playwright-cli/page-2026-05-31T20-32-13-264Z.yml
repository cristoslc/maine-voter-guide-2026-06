            - heading "Absentee Ballot Process" [level=4] [ref=e288]
            - generic [ref=e289]:
              - generic [ref=e290]: Spread the word
              - generic "Facebook" [ref=e291]:
                - img [ref=e292]
              - generic "Twitter" [ref=e300]:
                - img [ref=e301]
              - generic "Permalink" [ref=e307]:
                - img [ref=e308]
              - alert [ref=e317]:
                - generic [ref=e318]: Permalink copied to clipboard
          - generic [ref=e319]:
            - paragraph [ref=e320]:
              - strong [ref=e321]: Vote-by-mail (absentee voting) is available in Maine and no excuse is required.
              - text: The last day to request an absentee ballot is the Thursday before every election at 5:00pm. You can submit your absentee ballot request form through the mail, by email, in person at your local elections office, or
              - link "online" [ref=e322] [cursor=pointer]:
                - /url: https://apps.web.maine.gov/cgi-bin/online/AbsenteeBallot/index.pl
              - text: .
            - paragraph [ref=e323]:
              - text: Voted ballots must be received by 8:00pm on Election Day to be counted. You can track your absentee ballot on the Secretary of State's
              - link "website" [ref=e324] [cursor=pointer]:
                - /url: https://apps.web.maine.gov/cgi-bin/online/AbsenteeBallot/ballot_status.pl
              - text: .
            - heading "WHO IS ELIGIBLE TO VOTE ABSENTEE?" [level=6] [ref=e325]:
              - strong [ref=e326]: WHO IS ELIGIBLE TO VOTE ABSENTEE?
            - paragraph [ref=e327]: In Maine, all registered voters can apply to vote absentee.
            - heading "WHAT ARE THE TYPES OF ABSENTEE VOTING IN MAINE?" [level=6] [ref=e328]:
              - strong [ref=e329]: WHAT ARE THE TYPES OF ABSENTEE VOTING IN MAINE?
            - list [ref=e330]:
              - listitem [ref=e331]: By mail
              - listitem [ref=e332]: Early voting in-person
              - listitem [ref=e333]: Electronic Accessible Absentee Ballot
              - listitem [ref=e334]: Special Circumstances Absentee Voting
              - listitem [ref=e335]: Uniformed Service or Overseas Voters
            - heading "HOW DO I REQUEST AN ABSENTEE BALLOT?" [level=6] [ref=e336]:
              - strong [ref=e337]: HOW DO I REQUEST AN ABSENTEE BALLOT?
            - paragraph [ref=e338]: "You can request an absentee ballot beginning 2 months before a Primary Election and 3 months before all other elections. There are several methods to request your absentee ballot:"
            - list [ref=e339]:
              - listitem [ref=e340]: Online
              - listitem [ref=e341]: In person
              - listitem [ref=e342]: By mail
              - listitem [ref=e343]: By phone
              - listitem [ref=e344]: Enroll in the Ongoing Absentee Ballot Program
            - heading "WHAT IS THE DEADLINE TO REQUEST AN ABSENTEE BALLOT?" [level=6] [ref=e345]:
              - strong [ref=e346]: WHAT IS THE DEADLINE TO REQUEST AN ABSENTEE BALLOT?
            - paragraph [ref=e347]: The Thursday before election day at 5:00pm. After this deadline, you may request an absentee ballot by completing and signing a Special Circumstances Absentee Ballot Application (if you meet one of the four requirements).
            - heading "WHAT IS SPECIAL CIRCUMSTANCES ABSENTEE VOTING?" [level=6] [ref=e348]:
              - strong [ref=e349]: WHAT IS SPECIAL CIRCUMSTANCES ABSENTEE VOTING?
            - paragraph [ref=e350]: "There is a deadline to request your absentee ballot, which is the Thursday before Election Day. After the normal deadline, you will need to provide an excuse. That can include one of these four reasons:"
            - list [ref=e351]:
              - listitem [ref=e352]: Unexpected absence from the municipality during the entire time the polls are open on Election Day; or
              - listitem [ref=e353]: Physical disability; or
              - listitem [ref=e354]: Incapacity or illness that has resulted in the voter being unable to leave home or a treatment facility; or
              - listitem [ref=e355]: Inability to travel to the polls if the voter is a coastal island ward or precinct resident.
            - heading "WHAT IS THE ELECTRONIC ACCESSIBLE ABSENTEE BALLOT?" [level=6] [ref=e356]:
              - strong [ref=e357]: WHAT IS THE ELECTRONIC ACCESSIBLE ABSENTEE BALLOT?
            - paragraph [ref=e358]:
              - text: This is a method of voting for individuals with print disabilities to ensure they can vote absentee privately and independently, as required under federal law. If you are a person with a print disability that wishes to cast their absentee ballot in this method, view the
              - link "Secretary of State’s website" [ref=e359] [cursor=pointer]:
                - /url: https://www.maine.gov/sos/elections-voting/accessible-voting
              - text: for more information.
            - heading "WHAT IS THE ONGOING ABSENTEE BALLOT VOTER STATUS?" [level=6] [ref=e360]:
              - strong [ref=e361]: WHAT IS THE ONGOING ABSENTEE BALLOT VOTER STATUS?
            - paragraph [ref=e362]:
              - text: A registered voter that enrolls in the program can automatically receive their absentee ballot in the mail. This program is available to all registered Maine voters. To enroll in the program, complete
              - link "this form" [ref=e363] [cursor=pointer]:
                - /url: https://www.maine.gov/sos/sites/maine.gov.sos/files/inline-files/3%20Ongoing%20AbsenteeStatusApp%20fillable%20pdf%20FINAL.pdf
              - text: and return to your town clerk.
            - heading "DO I HAVE TO REQUEST AN ABSENTEE BALLOT FOR EACH ELECTION?" [level=6] [ref=e364]:
              - strong [ref=e365]: DO I HAVE TO REQUEST AN ABSENTEE BALLOT FOR EACH ELECTION?
            - paragraph [ref=e366]: Yes, you must request an absentee ballot for each election. The only exception is for those enrolled in the Ongoing Absentee Ballot Status Program.
            - heading "WHEN ARE ABSENTEE BALLOTS MAILED OUT TO VOTERS WHO HAVE REQUESTED THEM?" [level=6] [ref=e367]:
              - strong [ref=e368]: WHEN ARE ABSENTEE BALLOTS MAILED OUT TO VOTERS WHO HAVE REQUESTED THEM?
            - paragraph [ref=e369]: Ballots are provided to town clerks 30 days prior to Election Day. Clerks begin mailing them out soon after to those who requested an absentee ballot.
            - heading "HOW DO I RETURN MY ABSENTEE BALLOT?" [level=6] [ref=e370]:
              - strong [ref=e371]: HOW DO I RETURN MY ABSENTEE BALLOT?
            - paragraph [ref=e372]:
              - text: You can mail your ballot to your town clerk, drop it in a secure ballot drop box, or deliver it in person to your town clerk. If you are returning the ballot by mail, be sure to allow at least 7 days for delivery. Please contact your
              - link "local elections office" [ref=e373] [cursor=pointer]:
                - /url: https://absentee.vote411.org/vote/eoddomestic.htm
              - text: for additional information. Due to possible USPS mailing delays, we highly encourage voters to return their absentee ballot in-person or via a drop box.
            - heading "CAN I TRACK MY MAILED ABSENTEE BALLOT?" [level=6] [ref=e374]:
              - strong [ref=e375]: CAN I TRACK MY MAILED ABSENTEE BALLOT?
            - paragraph [ref=e376]:
              - text: Yes. You can track your absentee ballot on the Secretary of State's
              - link "website" [ref=e377] [cursor=pointer]:
                - /url: https://apps.web.maine.gov/cgi-bin/online/AbsenteeBallot/ballot_status.pl
              - text: .
            - heading "WHAT IF I REQUESTED AN ABSENTEE BALLOT BUT WANT TO VOTE IN PERSON?" [level=6] [ref=e378]:
              - strong [ref=e379]: WHAT IF I REQUESTED AN ABSENTEE BALLOT BUT WANT TO VOTE IN PERSON?
            - paragraph [ref=e380]: If you want to vote in person, do not mail or return your voted absentee ballot. Absentee ballots are processed in batches throughout the day, and the list of those newly received absentee ballots is shared with each polling place for each batch. If you submitted your voted absentee ballot, you will not be able to vote in person. If you vote in person before your absentee ballot arrives that day, your absentee ballot will be rejected.
            - link "Request your Ballot" [ref=e381] [cursor=pointer]:
              - /url: http://www.maine.gov/cgi-bin/online/AbsenteeBallot/index.pl
